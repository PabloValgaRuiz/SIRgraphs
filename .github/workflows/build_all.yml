name: Build Cross-Platform
# File Generated with Google Gemini
# Trigger this script every time code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # WINDOWS BUILD SERVER
  # ==========================================
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code and Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive # CRITICAL: Downloads ImGui!

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build Application (Release)
      run: cmake --build build --config Release

    - name: Upload Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: SIRgraphs-Windows
        path: build/Release/SIRgraphs.exe

  # ==========================================
  # MAC BUILD SERVER
  # ==========================================
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout Code and Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Mac Dependencies
      run: brew install glfw cmake

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build Application
      run: cmake --build build --config Release

      # Sign the app with a local dummy certificate and compress it
    - name: Package Mac App
      run: |
        cd build
        # Ad-hoc sign the app so Apple Silicon doesn't instantly kill it
        codesign --force --deep -s - SIRgraphs.app
        # Compress it to preserve the +x execution permissions
        tar -czvf SIRgraphs-MacOS.tar.gz SIRgraphs.app

    - name: Upload Mac App
      uses: actions/upload-artifact@v4
      with:
        name: SIRgraphs-MacOS
        path: build/SIRgraphs-MacOS.tar.gz


  # ==========================================
  # LINUX BUILD SERVER (Ubuntu)
  # ==========================================
  build-linux:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Code and Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # graphics and windowing headers to compile GLFW/OpenGL
    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libglfw3-dev libgl1-mesa-dev xorg-dev

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build Application
      run: cmake --build build --config Release

    # compress it on the server to preserve the +x executable permissions
    - name: Package Linux App
      run: |
        cd build
        tar -czvf SIRgraphs-Linux.tar.gz SIRgraphs

    - name: Upload Linux App
      uses: actions/upload-artifact@v4
      with:
        name: SIRgraphs-Linux
        path: build/SIRgraphs-Linux.tar.gz